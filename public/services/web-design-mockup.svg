<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <!-- Desktop Window -->
  <g transform="translate(80, 80)">
    <rect width="640" height="400" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="2" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.05))"/>
    <rect x="0" y="0" width="640" height="32" rx="12" fill="#f3f4f6"/>
    <circle cx="20" cy="16" r="4" fill="#d1d5db"/>
    <circle cx="36" cy="16" r="4" fill="#d1d5db"/>
    <circle cx="52" cy="16" r="4" fill="#d1d5db"/>
    <!-- Hero Section -->
    <rect x="40" y="60" width="280" height="120" rx="6" fill="#f3f4f6"/>
    <rect x="360" y="70" width="240" height="24" rx="4" fill="#e5e7eb"/>
    <rect x="360" y="106" width="200" height="12" rx="3" fill="#f3f4f6"/>
    <rect x="360" y="126" width="180" height="12" rx="3" fill="#f3f4f6"/>
    <rect x="360" y="156" width="100" height="24" rx="12" fill="#111827"/>
    <!-- Features Grid -->
    <rect x="40" y="210" width="170" height="150" rx="6" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
    <rect x="56" y="226" width="40" height="40" rx="4" fill="#e5e7eb"/>
    <rect x="56" y="280" width="100" height="8" rx="2" fill="#d1d5db"/>
    <rect x="56" y="296" width="138" height="6" rx="2" fill="#f3f4f6"/>
    
    <rect x="235" y="210" width="170" height="150" rx="6" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
    <rect x="251" y="226" width="40" height="40" rx="4" fill="#e5e7eb"/>
    <rect x="251" y="280" width="100" height="8" rx="2" fill="#d1d5db"/>
    <rect x="251" y="296" width="138" height="6" rx="2" fill="#f3f4f6"/>
    
    <rect x="430" y="210" width="170" height="150" rx="6" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
    <rect x="446" y="226" width="40" height="40" rx="4" fill="#e5e7eb"/>
    <rect x="446" y="280" width="100" height="8" rx="2" fill="#d1d5db"/>
    <rect x="446" y="296" width="138" height="6" rx="2" fill="#f3f4f6"/>
  </g>
  <!-- Mobile Window Overlap -->
  <g transform="translate(560, 220)">
    <rect width="180" height="340" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="6" filter="drop-shadow(0 20px 25px rgba(0,0,0,0.1))"/>
    <rect x="70" y="10" width="40" height="4" rx="2" fill="#d1d5db"/>
    <!-- Mobile Content -->
    <rect x="16" y="40" width="148" height="100" rx="6" fill="#f3f4f6"/>
    <rect x="16" y="156" width="120" height="12" rx="3" fill="#e5e7eb"/>
    <rect x="16" y="176" width="100" height="8" rx="2" fill="#f3f4f6"/>
    <rect x="16" y="190" width="148" height="8" rx="2" fill="#f3f4f6"/>
    <rect x="16" y="216" width="80" height="20" rx="10" fill="#111827"/>
    <rect x="16" y="256" width="148" height="60" rx="6" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  </g>
</svg>
